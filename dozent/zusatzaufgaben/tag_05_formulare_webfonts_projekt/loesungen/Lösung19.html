<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellipsen-Div</title>
    <style>
        .ellipse {
            width: 200px;
            /* Breite der Ellipse */
            height: 100px;
            /* Höhe der Ellipse */
            background-color: green;
            /* Hintergrundfarbe des Divs */
            border-radius: 50%;
            /* Rundungsradius für Ellipsenform */
            text-align: center;
            /* Zentrieren des Inhalts horizontal */
            line-height: 100px;
            /* Zentrieren des Inhalts vertikal */
            color: white;
            /* Textfarbe */
            font-family: Arial, sans-serif;
            /* Schriftart */
        }
    </style>
  <link rel="stylesheet" href="">
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>

    <div class="ellipse">
        Diese Ellipse wird mit CSS erstellt.
    </div>

</body>

</html>
