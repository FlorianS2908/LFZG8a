<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<style>
    body {
        width: 100%;
        height: 100vh;
        background-color: blanchedalmond;
        padding: 20px;
    }

    #centerdiv {

        margin-right: 100px;
    }

    a {
        float: left;
        margin-left: 10px;
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    }

    .dropdown {
        position: relative;
        display: inline;
        margin-left: 20px;
    }

    .dropdown-content {
        display: none;
        position: relative;
        background-color: rgb(250, 212, 156);
        min-width: 50px;
        max-width: 100px;
        min-height: 50px;
        box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
        padding: 12px 16px;
        z-index: 1;
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }

    span {
        font-size: x-large;
    }

    .elipse {
        border: solid;
        border-radius: 50%;
        width: 100px;
        height: 50px;
        float: left;
        background-image: linear-gradient(to right, red, white);
        rotate: 33deg;
        position: relative;
        top: 15px;
        left: 15px;

    }

    .elipse2 {
        border: solid;
        border-radius: 50%;
        width: 100px;
        height: 50px;
        float: left;
        background-image: linear-gradient(to right, red, white);
        transform: scaleX(-1);
        rotate: 270deg;
        position: relative;
        left: -33px;

    }

    .elipse3 {
        border: solid;
        border-radius: 50%;
        width: 100px;
        height: 50px;
        float: left;
        background-image: linear-gradient(to right, red, white);
        transform: scaleX(-1);
        rotate: 315deg;
        position: relative;
        left: -80px;
        top: 10px;
    }

    .elipse4 {
        border: solid;
        border-radius: 50%;
        width: 100px;
        height: 50px;
        background-image: linear-gradient(to right, red, white);
        position: relative;
        top: 60px;
        left: 5px;
    }

    .elipse5 {
        border: solid;
        border-radius: 50%;
        width: 100px;
        height: 50px;
        float: left;
        background-image: linear-gradient(to right, red, white);
        rotate: 180deg;
        position: relative;
        left: 150px;
    }

    .elipse6 {
        border: solid;
        border-radius: 50%;
        width: 100px;
        height: 50px;
        float: left;
        background-image: linear-gradient(to right, red, white);
        transform: scaleX(-1);
        rotate: 150deg;
        position: relative;
        top: 50px;
        left: -80px;
    }

    .elipse7 {
        border: solid;
        border-radius: 50%;
        width: 100px;
        height: 50px;
        float: left;
        background-image: linear-gradient(to right, red, white);
        transform: scaleX(-1);
        rotate: 90deg;
        position: relative;
        top: 70px;
        left: -130px;
    }

    .elipse8 {
        border: solid;
        border-radius: 50%;
        width: 100px;
        height: 50px;
        float: left;
        background-image: linear-gradient(to right, red, white);
        transform: scaleX(-1);
        rotate: 49deg;
        position: relative;
        top: 50px;
        left: -185px;
    }

    .elipse9 {
        border: solid;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        float: left;
        background-image: radial-gradient(white, yellow);
        position: relative;
        left: -323px;
    }
</style>


<body>
    <div id="centerdiv">
        <div class="rahmen">
            <div class="elipse"></div>
            <div class="elipse2"></div>
            <div class="elipse3"></div>
            <div class="elipse4"></div>
            <div class="elipse5"></div>
            <div class="elipse6"></div>
            <div class="elipse7"></div>
            <div class="elipse8"></div>
            <div class="elipse9"></div>
        </div>

    </div>

</body>


</html>
