<!DOCTYPE html>

<html lang="en">

<head>
    <title>Ellipsis</title>
    <meta charset="utf-8">

    <style>
        body {
            display: flex;
        }

        #flower {
            display: flex;
            align-items: center;
            flex-direction: column;
        }

        #flower>div {
            position: absolute;
            top: 150px;
            left: 150px;
            transform-origin: 25px 0px;
            background-color: red;
            width: 50px;
            height: 100px;
            border-radius: 50%;
            text-align: center;
            border: 1px solid black;
        }

        #flower>div:nth-child(2) {
            transform: rotate(0deg) translate(0px, 10px);
        }

        #flower>div:nth-child(3) {
            transform: rotate(45deg) translate(0px, 10px);
        }

        #flower>div:nth-child(4) {
            transform: rotate(90deg) translate(0px, 10px);
        }


        #flower>div:nth-child(5) {
            transform: rotate(135deg) translate(0px, 10px);
        }

        #flower>div:nth-child(6) {
            transform: rotate(180deg) translate(0px, 10px);
        }


        #flower>div:nth-child(7) {
            transform: rotate(225deg) translate(0px, 10px);
        }

        #flower>div:nth-child(8) {
            transform: rotate(270deg) translate(0px, 10px);
        }

        #flower>div:nth-child(9) {
            transform: rotate(315deg) translate(0px, 10px);
        }

        #flower>#center {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: green;
            transform: translate(10px, -15px);
        }
    </style>
  <link rel="stylesheet" href="">
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>
    <div id="flower">
        <div id="center">
        </div>
        <div>
        </div>
        <div>
        </div>
        <div>
        </div>
        <div>
        </div>
        <div>
        </div>
        <div>
        </div>
        <div>
        </div>
        <div>
        </div>
    </div>
</body>

</html>
