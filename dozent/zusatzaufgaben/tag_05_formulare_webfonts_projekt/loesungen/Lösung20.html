<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellipsen-Div</title>
    <style>
        .ellipse-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .ellipse,
        .mirror {
            width: 100px;
            height: 200px;
            /* Die gewÃ¼nschten Abmessungen fÃ¼r die Ellipse */
            border-radius: 50%;
        }

        .ellipse {
            background-color: #4CAF50;
            /* Farbe der Ellipse */
        }

        .mirror {
            position: absolute;
            left: 120px;
            /* Breite der Ellipse + Abstand */
            height: 100%;
            /* Die gleiche HÃ¶he wie die Ellipse */
            border-left: 2px solid #000;
            /* Farbe und Dicke der Linie */
            transform: scaleX(-1);
            /* Spiegelt das DIV horizontal */
            background-color: black;
        }
    </style>
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>

    <div class="ellipse-container">
        <div class="ellipse"></div>
        <div class="mirror"></div>
    </div>


</body>

</html>
