<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animationen und Übergänge</title>
    <style>
        /* CSS für die Seite */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f3f3;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            text-align: center;
        }

        .element {
            width: 100px;
            height: 100px;
            background-color: #3498db;
            color: #fff;
            line-height: 100px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }

        .element:hover {
            transform: scale(1.1);
            background-color: #2980b9;
        }

        /* Keyframe-Animation */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .fadeIn {
            animation: fadeIn 1s ease-out;
        }
    </style>
  <link rel="stylesheet" href="">
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>

    <div class="container">
        <div class="element">Element 1</div>
        <div class="element">Element 2</div>
        <div class="element">Element 3</div>
    </div>

    <script>
        // Hier wird JavaScript normalerweise eingefügt, aber du hast ausdrücklich darum gebeten, es nicht zu verwenden.
    </script>

</body>

</html>
