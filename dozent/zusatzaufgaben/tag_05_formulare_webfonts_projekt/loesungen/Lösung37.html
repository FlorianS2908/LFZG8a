<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benutzerdefinierte Schriftarten</title>
    <!-- Google Fonts einbinden -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- CSS für Anwendung der Schriftart -->
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            /* Beispiel-Styling */
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            color: #333;
            text-align: center;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
  <link rel="stylesheet" href="">
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>
    <div class="container">
        <h1>Benutzerdefinierte Schriftarten</h1>
        <p>Dies ist ein Beispieltext, der die benutzerdefinierte Schriftart "Roboto" verwendet.</p>
        <p>Google Fonts bietet eine Vielzahl von Schriftarten zur Auswahl.</p>
    </div>
</body>

</html>
