<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design Beispiel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .content {
            background-color: #f2f2f2;
            padding: 20px;
            margin-bottom: 20px;
        }

        footer {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        /* Media Queries */
        @media screen and (max-width: 768px) {

            header,
            footer {
                padding: 10px;
            }

            .container {
                padding: 10px;
            }
        }

        @media screen and (max-width: 480px) {

            header,
            footer {
                font-size: 14px;
            }

            .content {
                padding: 10px;
            }
        }
    </style>
  <link rel="stylesheet" href="">
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>
    <header>
        <h1>Responsive Design Beispiel</h1>
    </header>
    <div class="container">
        <div class="content">
            <h2>Content Bereich</h2>
            <p>Dies ist der Hauptinhalt der Seite.</p>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 Beispielunternehmen. Alle Rechte vorbehalten.</p>
    </footer>
</body>

</html>
