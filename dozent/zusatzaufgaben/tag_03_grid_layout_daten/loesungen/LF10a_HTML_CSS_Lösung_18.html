<!DOCTYPE html>
<html>
<head>
    <title>Meine erste Webseite</title>
</head>
<body>
<table id="datentabelle">
    <thead>
        <tr>
            <th>Name</th>
            <th>Alter</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
<script>
const daten = [
    { Name: "Max", Alter: 30 },
    { Name: "Anna", Alter: 25 },
    { Name: "Peter", Alter: 35 }
];

const tbody = document.getElementById('datentabelle').getElementsByTagName('tbody')[0];

daten.forEach(function(eintrag) {
    const zeile = tbody.insertRow();
    const zelle1 = zeile.insertCell(0);
    const zelle2 = zeile.insertCell(1);
    zelle1.innerHTML = eintrag.Name;
    zelle2.innerHTML = eintrag.Alter;
});

</script>








</body>
</html>
