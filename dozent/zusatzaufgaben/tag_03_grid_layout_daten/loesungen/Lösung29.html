<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-Modell Beispiel</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            margin: 10px;
            padding: 20px;
            border: 2px solid black;
            box-sizing: border-box;
        }
    </style>
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box" style="width: 150px; height: 150px;">Box 2</div>
        <div class="box" style="margin: 20px;">Box 3</div>
    </div>

</body>

</html>
