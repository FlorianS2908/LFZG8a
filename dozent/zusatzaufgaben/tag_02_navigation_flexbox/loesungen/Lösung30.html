<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            /* Flexbox-Container */
            justify-content: space-between;
            /* Elemente werden gleichmÃ¤ÃŸig in der Zeile verteilt */
            align-items: center;
            /* Elemente werden zentriert ausgerichtet */
            width: 100%;
        }

        .item {
            flex: 1;
            /* Jedes Element erhÃ¤lt den gleichen Anteil an Platz */
            padding: 10px;
            border: 1px solid black;
            text-align: center;
        }
    </style>
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>

    <div class="container">
        <div class="item">Element 1</div>
        <div class="item">Element 2</div>
        <div class="item">Element 3</div>
    </div>

</body>

</html>
