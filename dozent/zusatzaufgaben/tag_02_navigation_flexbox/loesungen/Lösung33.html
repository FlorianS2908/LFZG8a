<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Klassen und Pseudo-Elemente</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .btn {
            position: relative;
            /* Damit das Pseudo-Element relativ zur Position des Buttons positioniert wird */
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #2980b9;
            /* Ändert die Hintergrundfarbe beim Hovern */
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            opacity: 0;
            /* Standardmäßig unsichtbar */
            transition: opacity 0.3s ease;
        }

        .btn:hover::before {
            opacity: 1;
            /* Mach das Pseudo-Element sichtbar, wenn der Button gehovert wird */
        }
    </style>
  <link rel="stylesheet" href="">
  <link rel="stylesheet" href="../../../assets/css/unified-layout.css">
</head>

<body>
    <div class="container">
        <button class="btn">Hover mich</button>
    </div>
</body>

</html>
