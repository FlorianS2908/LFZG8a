<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ueTool_asSaaS Freigabezentrum</title>
  <link rel="stylesheet" href="workspace.css">
</head>
<body>
  <div class="tool-center-shell factory-shell">
    <header class="workspace-header">
      <div class="workspace-title">
        <img class="workspace-company-logo" src="assets/ploglan-logo.png" alt="Ploglan">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Freigabezentrum</h1>
        </div>
      </div>
      <div class="workspace-actions">
        <button class="secondary-button" type="button" data-open-landing>ueTool_asSaaS</button>
        <button class="primary-button" type="button" data-refresh>Aktualisieren</button>
      </div>
    </header>

    <main class="factory-layout">
      <article class="tool-card">
        <h2>Freigabezentrum</h2>
        <p>Hier koennen registrierte Benutzer Kurse erhalten und Registrierungsfreigaben widerrufen werden.</p>
        <div class="factory-form-grid">
          <label>Suche<input data-user-search placeholder="Name oder E-Mail"></label>
          <label>Filter
            <select data-role-filter>
              <option value="all">Alle</option>
              <option value="Dozent">Dozenten</option>
              <option value="Teilnehmer">Teilnehmer</option>
            </select>
          </label>
        </div>
      </article>
      <article class="tool-card">
        <h2>Registrierte Benutzer</h2>
        <section class="factory-grid" data-user-list></section>
      </article>
      <article class="tool-card">
        <h2>Offene Registrierungsfreigaben</h2>
        <section class="factory-grid" data-pending-list></section>
      </article>
      <p class="status-line" data-release-status></p>
    </main>
  </div>
  <script src="release-center.js"></script>
</body>
</html>
