<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ueTool_asSaaS Benutzer anlegen</title>
  <link rel="stylesheet" href="workspace.css">
</head>
<body>
  <div class="tool-center-shell factory-shell">
    <header class="workspace-header">
      <div class="workspace-title">
        <img class="workspace-company-logo" src="assets/ploglan-logo.png" alt="Ploglan">
        <div>
          <p class="eyebrow">Admin</p>
          <h1 data-create-title>Benutzer anlegen</h1>
        </div>
      </div>
      <div class="workspace-actions">
        <button class="secondary-button" type="button" data-open-landing>ueTool_asSaaS</button>
      </div>
    </header>

    <main class="factory-layout">
      <article class="tool-card">
        <h2 data-create-heading>Benutzer vormerken</h2>
        <p data-create-copy>Erstellen Sie eine lokale Registrierungsfreigabe.</p>
        <form class="login-form" data-create-form>
          <label>Name
            <input data-create-name autocomplete="name" required>
          </label>
          <label>E-Mail
            <input data-create-email type="email" autocomplete="email" required>
          </label>
          <label>Notiz optional
            <textarea data-create-note rows="4" placeholder="Interne Notiz"></textarea>
          </label>
          <button class="primary-button" type="submit" data-create-submit>Vormerken</button>
        </form>
        <p class="status-line" data-create-status></p>
      </article>
    </main>
  </div>
  <script src="user-create.js"></script>
</body>
</html>
