name: Electron Desktop

on:
  push:
    branches:
      - electronDesktop
    paths:
      - 'desktop-app/**'
      - '.github/workflows/electron-desktop.yml'
  pull_request:
    paths:
      - 'desktop-app/**'
      - '.github/workflows/electron-desktop.yml'

jobs:
  verify:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check and test
        run: pnpm run verify
