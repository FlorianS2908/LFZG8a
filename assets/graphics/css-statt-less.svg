<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="t d"><title id="t">CSS statt Präprozessor</title><desc id="d">Mapping von alten Präprozessor-Ideen auf moderne CSS-Funktionen.</desc><defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#005b96"/><stop offset="1" stop-color="#00a6b8"/></linearGradient></defs><rect width="920" height="420" fill="#f5fbff"/><rect x="40" y="40" width="840" height="340" rx="28" fill="#fff" stroke="#cfe0ee"/><text x="70" y="92" font-family="Arial" font-size="28" font-weight="700" fill="#132238">Modernes CSS übernimmt die alten Präprozessor-Aufgaben</text><g font-family="Arial" font-size="18"><rect x="70" y="135" width="220" height="65" rx="16" fill="#e6f7fb"/><text x="95" y="163" font-weight="700" fill="#005b96">Variablen</text><text x="95" y="188" fill="#445">→ Custom Properties</text><rect x="350" y="135" width="220" height="65" rx="16" fill="#ecfdf5"/><text x="375" y="163" font-weight="700" fill="#0f766e">Mixins</text><text x="375" y="188" fill="#445">→ Komponenten/Utilities</text><rect x="630" y="135" width="220" height="65" rx="16" fill="#fff7ed"/><text x="655" y="163" font-weight="700" fill="#b45309">Operationen</text><text x="655" y="188" fill="#445">→ calc(), clamp()</text><rect x="70" y="245" width="220" height="65" rx="16" fill="#f0f9ff"/><text x="95" y="273" font-weight="700" fill="#0369a1">Nesting</text><text x="95" y="298" fill="#445">→ klare Struktur</text><rect x="350" y="245" width="220" height="65" rx="16" fill="#f8fafc"/><text x="375" y="273" font-weight="700" fill="#334155">Layouts</text><text x="375" y="298" fill="#445">→ Flexbox & Grid</text><rect x="630" y="245" width="220" height="65" rx="16" fill="#eef2ff"/><text x="655" y="273" font-weight="700" fill="#4338ca">Responsive</text><text x="655" y="298" fill="#445">→ Media Queries</text></g><path d="M70 340 H850" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/></svg>
